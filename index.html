<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICD-10 Quick Reference — Critical Care & Nephrology</title>
<style>
  :root {
    --bg: #0f1417;
    --panel: #161d22;
    --panel-2: #1c252b;
    --line: #2a363d;
    --ink: #e7edf0;
    --ink-dim: #8fa1ab;
    --accent: #4db6a4;
    --accent-dim: #2d6b61;
    --code: #7fd1c1;
    --warn: #d98c5f;
    --radius: 8px;
    --mono: "SF Mono", "JetBrains Mono", "Cascadia Code", Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  header {
    position: sticky;
    top: 0;
    z-index: 20;
    background: linear-gradient(180deg, var(--bg) 70%, transparent);
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--line);
  }
  .title-row {
    display: flex;
    align-items: baseline;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  h1 {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0;
  }
  .sub {
    font-size: 12px;
    color: var(--ink-dim);
    font-family: var(--mono);
  }
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  #search {
    flex: 1;
    min-width: 200px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    color: var(--ink);
    padding: 10px 14px;
    font-size: 15px;
    font-family: var(--sans);
    outline: none;
  }
  #search:focus { border-color: var(--accent-dim); }
  #search::placeholder { color: var(--ink-dim); }
  .filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .chip {
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--ink-dim);
    padding: 7px 13px;
    border-radius: 99px;
    font-size: 13px;
    cursor: pointer;
    user-select: none;
    transition: 0.12s;
  }
  .chip:hover { border-color: var(--accent-dim); color: var(--ink); }
  .chip.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: #fff;
  }
  .btn {
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--ink);
    padding: 8px 14px;
    border-radius: var(--radius);
    font-size: 13px;
    cursor: pointer;
    font-family: var(--sans);
    transition: 0.12s;
  }
  .btn:hover { border-color: var(--accent-dim); }
  .btn-primary { background: var(--accent-dim); border-color: var(--accent); color: #fff; }
  main { padding: 16px 20px 80px; max-width: 920px; margin: 0 auto; }
  .count { font-size: 12px; color: var(--ink-dim); margin-bottom: 12px; font-family: var(--mono); }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-dim);
    font-weight: 600;
    padding: 0 12px 8px;
    border-bottom: 1px solid var(--line);
  }
  tbody tr {
    border-bottom: 1px solid var(--line);
    transition: background 0.1s;
  }
  tbody tr:hover { background: var(--panel); }
  td { padding: 11px 12px; vertical-align: top; }
  .code {
    font-family: var(--mono);
    color: var(--code);
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    font-size: 14px;
  }
  .code:hover { text-decoration: underline; }
  .code.copied { color: var(--accent); }
  .desc { width: 100%; }
  .desc-text { cursor: pointer; }
  .desc-text:hover { text-decoration: underline; text-decoration-style: dotted; }
  .desc-text.copied { color: var(--accent); }
  .cat-tag {
    display: inline-block;
    font-size: 11px;
    color: var(--ink-dim);
    font-family: var(--mono);
  }
  .row-actions { white-space: nowrap; text-align: right; }
  .icon-btn {
    background: none;
    border: none;
    color: var(--ink-dim);
    cursor: pointer;
    font-size: 13px;
    padding: 4px 6px;
    border-radius: 4px;
  }
  .icon-btn:hover { color: var(--ink); background: var(--panel-2); }
  .icon-btn.del:hover { color: var(--warn); }
  mark { background: var(--accent-dim); color: #fff; border-radius: 2px; padding: 0 1px; }
  .empty { text-align: center; color: var(--ink-dim); padding: 50px 20px; font-size: 14px; }
  /* Modal */
  .modal-bg {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 50;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 22px;
    width: 100%;
    max-width: 440px;
  }
  .modal h2 { font-size: 15px; margin: 0 0 16px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--ink-dim); margin-bottom: 5px; }
  .field input, .field select {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 6px;
    color: var(--ink);
    padding: 9px 11px;
    font-size: 14px;
    font-family: var(--sans);
    outline: none;
  }
  .field input:focus, .field select:focus { border-color: var(--accent-dim); }
  .field input.mono { font-family: var(--mono); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent-dim);
    color: #fff;
    padding: 10px 18px;
    border-radius: 99px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: 0.2s;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .hint { font-size: 11px; color: var(--ink-dim); margin-top: 4px; font-family: var(--mono); }
  @media (max-width: 560px) {
    .cat-tag { display: none; }
    td { padding: 10px 8px; }
  }
</style>
</head>
<body>
<header>
  <div class="title-row">
    <h1>ICD-10 Quick Reference</h1>
    <span class="sub">Critical Care · Nephrology</span>
  </div>
  <div class="controls">
    <input id="search" type="text" placeholder="Search code or diagnosis…  (press / to focus)" autocomplete="off">
    <button class="btn btn-primary" id="addBtn">+ Add</button>
    <button class="btn" id="exportBtn">Export</button>
    <button class="btn" id="importBtn">Import</button>
    <input type="file" id="importFile" accept=".json" style="display:none">
  </div>
  <div class="filters" id="filters" style="margin-top:10px"></div>
</header>

<main>
  <div class="count" id="count"></div>
  <table>
    <thead>
      <tr>
        <th style="width:110px">Code</th>
        <th>Diagnosis</th>
        <th style="width:90px"></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="empty" id="empty" style="display:none">No matches. Try a different term, or add it with <strong>+ Add</strong>.</div>
</main>

<!-- Add/Edit Modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2 id="modalTitle">Add diagnosis</h2>
    <div class="field">
      <label>ICD-10 Code</label>
      <input id="fCode" class="mono" placeholder="e.g. N18.30" autocomplete="off">
    </div>
    <div class="field">
      <label>Description</label>
      <input id="fDesc" placeholder="e.g. Chronic kidney disease, stage 3a" autocomplete="off">
    </div>
    <div class="field">
      <label>Category</label>
      <select id="fCat"></select>
      <div class="hint">Pick existing or type a new one below</div>
      <input id="fCatNew" placeholder="…or new category" style="margin-top:6px" autocomplete="off">
    </div>
    <div class="modal-actions">
      <button class="btn" id="cancelBtn">Cancel</button>
      <button class="btn btn-primary" id="saveBtn">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

  ["I60.9","Nontraumatic subarachnoid hemorrhage, unspecified","Neurology · Stroke"],
  ["I62.00","Nontraumatic subdural hemorrhage, unspecified","Neurology · Stroke"],
  ["G45.9","Transient cerebral ischemic attack, unspecified (TIA)","Neurology · Stroke"],
  // ── Neurology · Seizure/Encephalopathy ──
  ["G40.911","Epilepsy, unspecified, intractable, with status epilepticus","Neurology · Seizure/Enceph"],
  ["G40.901","Epilepsy, unspecified, not intractable, with status epilepticus","Neurology · Seizure/Enceph"],
  ["R56.9","Unspecified convulsions","Neurology · Seizure/Enceph"],
  ["G93.40","Encephalopathy, unspecified","Neurology · Seizure/Enceph"],
  ["G93.41","Metabolic encephalopathy","Neurology · Seizure/Enceph"],
  ["G04.90","Encephalitis and encephalomyelitis, unspecified","Neurology · Seizure/Enceph"],
  ["G93.6","Cerebral edema","Neurology · Seizure/Enceph"],
  ["G93.5","Compression of brain","Neurology · Seizure/Enceph"],
  // ── Neurology · Coma/Neuromuscular ──
  ["R40.2120","Coma scale, eyes open, never, unspecified time","Neurology · Coma/NM"],
  ["G91.1","Obstructive hydrocephalus","Neurology · Coma/NM"],
  ["G61.0","Guillain-Barre syndrome","Neurology · Coma/NM"],
  ["G70.01","Myasthenia gravis with (acute) exacerbation (crisis)","Neurology · Coma/NM"],
  ["G00.9","Bacterial meningitis, unspecified","Neurology · Coma/NM"],
  ["A87.9","Viral meningitis, unspecified","Neurology · Coma/NM"],
  ["G83.9","Paralytic syndrome, unspecified","Neurology · Coma/NM"],
  ["I67.83","Posterior reversible encephalopathy syndrome (PRES)","Neurology · Coma/NM"],
];

const KEY = "icd10ref_v1";
let data = load();
let activeFilter = "All";
let editIndex = null;

function load() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) return JSON.parse(raw);
  } catch(e){}
  return SEED.map(([code,desc,cat]) => ({code,desc,cat}));
}
function save() {
  try { localStorage.setItem(KEY, JSON.stringify(data)); } catch(e){}
}

function categories() {
  const set = new Set(data.map(d => d.cat).filter(Boolean));
  return ["All", ...[...set].sort()];
}

function esc(s){ return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function highlight(text, q) {
  if (!q) return esc(text);
  const i = text.toLowerCase().indexOf(q.toLowerCase());
  if (i < 0) return esc(text);
  return esc(text.slice(0,i)) + "<mark>" + esc(text.slice(i,i+q.length)) + "</mark>" + esc(text.slice(i+q.length));
}

function renderFilters() {
  const el = document.getElementById("filters");
  el.innerHTML = "";
  categories().forEach(cat => {
    const c = document.createElement("span");
    c.className = "chip" + (cat === activeFilter ? " active" : "");
    // show short label for grouped cats
    c.textContent = cat;
    c.onclick = () => { activeFilter = cat; render(); };
    el.appendChild(c);
  });
}

function render() {
  const q = document.getElementById("search").value.trim();
  const ql = q.toLowerCase();
  let rows = data.map((d,i) => ({...d, i}));
  if (activeFilter !== "All") rows = rows.filter(r => r.cat === activeFilter);
  if (ql) rows = rows.filter(r =>
    r.code.toLowerCase().includes(ql) || r.desc.toLowerCase().includes(ql)
  );
  rows.sort((a,b) => a.code.localeCompare(b.code));

  const tb = document.getElementById("tbody");
  tb.innerHTML = "";
  rows.forEach(r => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td><span class="code" data-copy="${esc(r.code)}" title="Click to copy code">${highlight(r.code,q)}</span></td>
      <td class="desc"><span class="desc-text" data-copy="${esc(r.desc)}" title="Click to copy diagnosis">${highlight(r.desc,q)}</span><br><span class="cat-tag">${esc(r.cat||"")}</span></td>
      <td class="row-actions">
        <button class="icon-btn" data-copyboth="${esc(r.code)} — ${esc(r.desc)}" title="Copy code + diagnosis">copy both</button>
        <button class="icon-btn" data-edit="${r.i}" title="Edit">edit</button>
        <button class="icon-btn del" data-del="${r.i}" title="Delete">del</button>
      </td>`;
    tb.appendChild(tr);
  });

  document.getElementById("empty").style.display = rows.length ? "none" : "block";
  document.getElementById("count").textContent =
    `${rows.length} of ${data.length} codes` + (activeFilter !== "All" ? ` · ${activeFilter}` : "");

  renderFilters();
  bindRowEvents();
}

function bindRowEvents() {
  function doCopy(text, label) {
    navigator.clipboard.writeText(text).then(() => {
      toast("Copied " + label);
    }).catch(() => {
      const t = document.createElement("textarea");
      t.value = text; document.body.appendChild(t); t.select();
      document.execCommand("copy"); t.remove();
      toast("Copied " + label);
    });
  }
  document.querySelectorAll("[data-copy]").forEach(el => {
    el.onclick = () => {
      const text = el.getAttribute("data-copy");
      el.classList.add("copied");
      setTimeout(() => el.classList.remove("copied"), 800);
      doCopy(text, text.length > 28 ? text.slice(0,28) + "…" : text);
    };
  });
  document.querySelectorAll("[data-copyboth]").forEach(el => {
    el.onclick = () => doCopy(el.getAttribute("data-copyboth"), "code + diagnosis");
  });
  document.querySelectorAll("[data-edit]").forEach(el => {
    el.onclick = () => openModal(parseInt(el.getAttribute("data-edit")));
  });
  document.querySelectorAll("[data-del]").forEach(el => {
    el.onclick = () => {
      const i = parseInt(el.getAttribute("data-del"));
      if (confirm(`Delete ${data[i].code} — ${data[i].desc}?`)) {
        data.splice(i,1); save(); render(); toast("Deleted");
      }
    };
  });
}

function openModal(index) {
  editIndex = (typeof index === "number") ? index : null;
  document.getElementById("modalTitle").textContent = editIndex===null ? "Add diagnosis" : "Edit diagnosis";
  const catSel = document.getElementById("fCat");
  catSel.innerHTML = "";
  [...new Set(data.map(d=>d.cat).filter(Boolean))].sort().forEach(c => {
    const o = document.createElement("option"); o.value=c; o.textContent=c; catSel.appendChild(o);
  });
  document.getElementById("fCatNew").value = "";
  if (editIndex !== null) {
    const d = data[editIndex];
    document.getElementById("fCode").value = d.code;
    document.getElementById("fDesc").value = d.desc;
    catSel.value = d.cat;
  } else {
    document.getElementById("fCode").value = "";
    document.getElementById("fDesc").value = "";
  }
  document.getElementById("modalBg").classList.add("open");
  document.getElementById("fCode").focus();
}
function closeModal(){ document.getElementById("modalBg").classList.remove("open"); }

function saveEntry() {
  const code = document.getElementById("fCode").value.trim().toUpperCase();
  const desc = document.getElementById("fDesc").value.trim();
  const catNew = document.getElementById("fCatNew").value.trim();
  const cat = catNew || document.getElementById("fCat").value || "Uncategorized";
  if (!code || !desc) { toast("Code and description required"); return; }
  if (editIndex !== null) {
    data[editIndex] = {code, desc, cat};
    toast("Updated " + code);
  } else {
    data.push({code, desc, cat});
    toast("Added " + code);
  }
  save(); closeModal(); render();
}

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove("show"), 1400);
}

function exportData() {
  const blob = new Blob([JSON.stringify(data,null,2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "icd10-reference.json";
  a.click();
  toast("Exported " + data.length + " codes");
}
function importData(file) {
  const r = new FileReader();
  r.onload = e => {
    try {
      const arr = JSON.parse(e.target.result);
      if (!Array.isArray(arr)) throw 0;
      const clean = arr.filter(x => x && x.code && x.desc).map(x => ({
        code: String(x.code), desc: String(x.desc), cat: String(x.cat||"Uncategorized")
      }));
      if (confirm(`Import ${clean.length} codes? This replaces your current list. (Export first if unsure.)`)) {
        data = clean; save(); activeFilter="All"; render(); toast("Imported " + clean.length + " codes");
      }
    } catch(err){ toast("Invalid file"); }
  };
  r.readAsText(file);
}

// Events
document.getElementById("search").addEventListener("input", render);
document.getElementById("addBtn").onclick = () => openModal();
document.getElementById("saveBtn").onclick = saveEntry;
document.getElementById("cancelBtn").onclick = closeModal;
document.getElementById("modalBg").onclick = e => { if (e.target.id==="modalBg") closeModal(); };
document.getElementById("exportBtn").onclick = exportData;
document.getElementById("importBtn").onclick = () => document.getElementById("importFile").click();
document.getElementById("importFile").onchange = e => { if(e.target.files[0]) importData(e.target.files[0]); };
document.addEventListener("keydown", e => {
  if (e.key === "/" && document.activeElement.id !== "search" && !document.getElementById("modalBg").classList.contains("open")) {
    e.preventDefault(); document.getElementById("search").focus();
  }
  if (e.key === "Escape") closeModal();
  if (e.key === "Enter" && document.getElementById("modalBg").classList.contains("open")) saveEntry();
});

render();
</script>
</body>
